<div class="container mt-4">
  <h2>All Products</h2>

  <table border="1" cellpadding="8" cellspacing="0" *ngIf="products.length > 0">
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Price</th>
        <th>Quantity</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let product of products">
        <td>{{ product.id }}</td>
        <td>{{ product.name }}</td>
        <td>{{ product.price }}</td>
        <td>{{ product.quantity }}</td>
      </tr>
    </tbody>
  </table>

  <p *ngIf="products.length === 0">No products found</p>
</div>
